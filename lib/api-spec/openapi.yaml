openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: fleet
    description: Operator fleet platform
  - name: drivers
    description: Driver records
  - name: alerts
    description: Derived fleet alerts
  - name: setup
    description: Org setup and rule profile
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out the current session
      responses:
        "204":
          description: Logged out
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /fleet/summary:
    get:
      operationId: getFleetSummary
      tags: [fleet]
      summary: Fleet KPI summary
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetSummary"
  /fleet/vehicles:
    get:
      operationId: getVehicleRows
      tags: [fleet]
      summary: Vehicle list with live status
      responses:
        "200":
          description: Vehicle rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VehicleRow"
  /drivers/{id}:
    get:
      operationId: getDriverRecord
      tags: [drivers]
      summary: Full driver record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Driver record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverRecord"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /alerts:
    get:
      operationId: getAlerts
      tags: [alerts]
      summary: Derived fleet alerts
      responses:
        "200":
          description: Alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"
  /alerts/acknowledge:
    post:
      operationId: acknowledgeAlert
      tags: [alerts]
      summary: Acknowledge an alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertAckInput"
      responses:
        "204":
          description: Acknowledged
  /setup/rule-profile:
    get:
      operationId: getRuleProfile
      tags: [setup]
      summary: Get the org rule profile
      responses:
        "200":
          description: Rule profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleProfile"
    patch:
      operationId: updateRuleProfile
      tags: [setup]
      summary: Update the org rule profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleProfile"
  /setup/org:
    get:
      operationId: getOrgProfile
      tags: [setup]
      summary: Get the org profile
      responses:
        "200":
          description: Org profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgProfile"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiErrorMessage:
      type: object
      required: [error]
      properties:
        error:
          type: string
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
    AuthUser:
      type: object
      required: [id, name, email, role, orgId, orgName]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
        orgId:
          type: string
        orgName:
          type: string
        driverId:
          type: ["string", "null"]
    FleetSummary:
      type: object
      required:
        - activeVehicles
        - crossBorderCount
        - needsAttentionCount
        - fleetCertifiedPct
        - movingCount
        - idlingCount
      properties:
        activeVehicles:
          type: integer
        crossBorderCount:
          type: integer
        needsAttentionCount:
          type: integer
        fleetCertifiedPct:
          type: integer
        movingCount:
          type: integer
        idlingCount:
          type: integer
    VehicleRow:
      type: object
      required:
        - vehicleId
        - reg
        - driverId
        - driverName
        - status
        - certification
        - speedKph
        - fuelPct
        - crossBorder
        - needsAttention
      properties:
        vehicleId:
          type: string
        reg:
          type: string
        driverId:
          type: ["string", "null"]
        driverName:
          type: string
        status:
          type: string
        certification:
          type: string
        speedKph:
          type: integer
        fuelPct:
          type: integer
        crossBorder:
          type: boolean
        needsAttention:
          type: boolean
        placeLabel:
          type: ["string", "null"]
    Clock:
      type: object
      required: [usedMins, limitMins, remainingMins, status]
      properties:
        usedMins:
          type: integer
        limitMins:
          type: integer
        remainingMins:
          type: integer
        status:
          type: string
    HosClocks:
      type: object
      required: [status, continuous, daily, weekly]
      properties:
        status:
          type: string
        continuous:
          $ref: "#/components/schemas/Clock"
        daily:
          $ref: "#/components/schemas/Clock"
        weekly:
          $ref: "#/components/schemas/Clock"
    IncidentItem:
      type: object
      required: [id, type, severity, status, riskPoints, occurredAt]
      properties:
        id:
          type: string
        type:
          type: string
        detail:
          type: ["string", "null"]
        severity:
          type: string
        status:
          type: string
        riskPoints:
          type: integer
        occurredAt:
          type: string
    DocumentItem:
      type: object
      required: [id, type, label, state]
      properties:
        id:
          type: string
        type:
          type: string
        label:
          type: string
        expiresOn:
          type: ["string", "null"]
        state:
          type: string
    CourseItem:
      type: object
      required: [id, title, status]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
        score:
          type: ["integer", "null"]
        completedOn:
          type: ["string", "null"]
    CertificationInfo:
      type: object
      required: [status, state]
      properties:
        status:
          type: string
        state:
          type: string
        issuedOn:
          type: ["string", "null"]
        expiresOn:
          type: ["string", "null"]
    DriverRecord:
      type: object
      required:
        - id
        - name
        - employeeNo
        - prdp
        - safetyScore
        - onTimePct
        - status
        - certification
        - hours
        - incidents
        - documents
        - courses
      properties:
        id:
          type: string
        name:
          type: string
        employeeNo:
          type: string
        phone:
          type: ["string", "null"]
        homeDepot:
          type: ["string", "null"]
        emergencyContact:
          type: ["string", "null"]
        licenceNo:
          type: ["string", "null"]
        licenceClass:
          type: ["string", "null"]
        prdp:
          type: boolean
        safetyScore:
          type: integer
        onTimePct:
          type: integer
        currentVehicleReg:
          type: ["string", "null"]
        placeLabel:
          type: ["string", "null"]
        fuelPct:
          type: ["integer", "null"]
        status:
          type: string
        certification:
          $ref: "#/components/schemas/CertificationInfo"
        hours:
          $ref: "#/components/schemas/HosClocks"
        incidents:
          type: array
          items:
            $ref: "#/components/schemas/IncidentItem"
        documents:
          type: array
          items:
            $ref: "#/components/schemas/DocumentItem"
        courses:
          type: array
          items:
            $ref: "#/components/schemas/CourseItem"
    Alert:
      type: object
      required: [key, kind, severity, driverId, driverName, message, acknowledged]
      properties:
        key:
          type: string
        kind:
          type: string
        severity:
          type: string
        driverId:
          type: string
        driverName:
          type: string
        message:
          type: string
        occurredAt:
          type: ["string", "null"]
        acknowledged:
          type: boolean
    AlertAckInput:
      type: object
      required: [key]
      properties:
        key:
          type: string
          minLength: 1
    RuleProfile:
      type: object
      required:
        - id
        - name
        - contMins
        - dailyMins
        - weeklyMins
        - dailyRestMins
        - breakMins
      properties:
        id:
          type: string
        name:
          type: string
        contMins:
          type: integer
        dailyMins:
          type: integer
        weeklyMins:
          type: integer
        dailyRestMins:
          type: integer
        breakMins:
          type: integer
    RuleProfileUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        contMins:
          type: integer
        dailyMins:
          type: integer
        weeklyMins:
          type: integer
        dailyRestMins:
          type: integer
        breakMins:
          type: integer
    OrgProfile:
      type: object
      required: [id, name, region]
      properties:
        id:
          type: string
        name:
          type: string
        region:
          type: string
