openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: fleet
    description: Owner fleet platform
  - name: drivers
    description: Driver records
  - name: alerts
    description: Derived fleet alerts
  - name: setup
    description: Org setup and rule profile
  - name: training
    description: Interactive training for all users
  - name: platform
    description: Superadmin platform console
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out the current session
      responses:
        "204":
          description: Logged out
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /fleet/summary:
    get:
      operationId: getFleetSummary
      tags: [fleet]
      summary: Fleet KPI summary
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetSummary"
  /fleet/vehicles:
    get:
      operationId: getVehicleRows
      tags: [fleet]
      summary: Vehicle list with live status
      responses:
        "200":
          description: Vehicle rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VehicleRow"
  /drivers/{id}:
    get:
      operationId: getDriverRecord
      tags: [drivers]
      summary: Full driver record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Driver record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverRecord"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /alerts:
    get:
      operationId: getAlerts
      tags: [alerts]
      summary: Derived fleet alerts
      responses:
        "200":
          description: Alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"
  /alerts/acknowledge:
    post:
      operationId: acknowledgeAlert
      tags: [alerts]
      summary: Acknowledge an alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertAckInput"
      responses:
        "204":
          description: Acknowledged
  /setup/rule-profile:
    get:
      operationId: getRuleProfile
      tags: [setup]
      summary: Get the org rule profile
      responses:
        "200":
          description: Rule profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleProfile"
    patch:
      operationId: updateRuleProfile
      tags: [setup]
      summary: Update the org rule profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleProfile"
  /setup/org:
    get:
      operationId: getOrgProfile
      tags: [setup]
      summary: Get the org profile
      responses:
        "200":
          description: Org profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgProfile"
  /training/modules:
    get:
      operationId: getTrainingModules
      tags: [training]
      summary: List training modules with the current user's completion state
      responses:
        "200":
          description: Training modules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingModuleList"
  /training/modules/{slug}:
    get:
      operationId: getTrainingModule
      tags: [training]
      summary: Get a single training module by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Training module
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingModuleDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /training/modules/{id}/complete:
    post:
      operationId: completeTrainingModule
      tags: [training]
      summary: Mark a training module complete for the current user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Marked complete
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
    delete:
      operationId: uncompleteTrainingModule
      tags: [training]
      summary: Clear a training module completion for the current user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Completion cleared
  /platform/overview:
    get:
      operationId: getPlatformOverview
      tags: [platform]
      summary: Cross-org platform overview
      responses:
        "200":
          description: Overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformOverview"
  /platform/orgs:
    get:
      operationId: getPlatformOrgs
      tags: [platform]
      summary: List all organizations
      responses:
        "200":
          description: Orgs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlatformOrg"
    post:
      operationId: createPlatformOrg
      tags: [platform]
      summary: Create an organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformOrgInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformOrg"
  /platform/orgs/{id}:
    patch:
      operationId: updatePlatformOrg
      tags: [platform]
      summary: Update an organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformOrgUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformOrg"
    delete:
      operationId: deletePlatformOrg
      tags: [platform]
      summary: Delete an organization and all its data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /platform/orgs/{id}/users:
    get:
      operationId: getPlatformOrgUsers
      tags: [platform]
      summary: List users in an organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlatformUser"
    post:
      operationId: createPlatformOrgUser
      tags: [platform]
      summary: Create a user in an organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformUserInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformUser"
  /platform/users/{id}:
    patch:
      operationId: updatePlatformUser
      tags: [platform]
      summary: Update a user (activate or deactivate)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformUserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformUser"
  /platform/training/modules:
    get:
      operationId: getPlatformTrainingModules
      tags: [platform]
      summary: List all training modules for management
      responses:
        "200":
          description: Modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingModuleDetail"
    post:
      operationId: createPlatformTrainingModule
      tags: [platform]
      summary: Create a training module
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainingModuleInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingModuleDetail"
  /platform/training/modules/{id}:
    patch:
      operationId: updatePlatformTrainingModule
      tags: [platform]
      summary: Update a training module
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainingModuleInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingModuleDetail"
    delete:
      operationId: deletePlatformTrainingModule
      tags: [platform]
      summary: Delete a training module
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /platform/training/reorder:
    post:
      operationId: reorderPlatformTrainingModules
      tags: [platform]
      summary: Reorder training modules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainingReorderInput"
      responses:
        "204":
          description: Reordered
  /platform/enter-org:
    post:
      operationId: enterOrg
      tags: [platform]
      summary: Begin impersonating an organization as owner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnterOrgInput"
      responses:
        "200":
          description: Now impersonating
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "404":
          description: Org not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /platform/exit-org:
    post:
      operationId: exitOrg
      tags: [platform]
      summary: Stop impersonating and return to the platform console
      responses:
        "200":
          description: Impersonation ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiErrorMessage:
      type: object
      required: [error]
      properties:
        error:
          type: string
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
    AuthUser:
      type: object
      required: [id, name, email, role, realRole, orgId, orgName, impersonating]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
        realRole:
          type: string
        orgId:
          type: ["string", "null"]
        orgName:
          type: string
        driverId:
          type: ["string", "null"]
        impersonating:
          type: boolean
    FleetSummary:
      type: object
      required:
        - activeVehicles
        - crossBorderCount
        - needsAttentionCount
        - fleetCertifiedPct
        - movingCount
        - idlingCount
      properties:
        activeVehicles:
          type: integer
        crossBorderCount:
          type: integer
        needsAttentionCount:
          type: integer
        fleetCertifiedPct:
          type: integer
        movingCount:
          type: integer
        idlingCount:
          type: integer
        avgSpeedKph:
          type: integer
        avgFuelPct:
          type: integer
        totalOdometerKm:
          type: integer
    VehicleRow:
      type: object
      required:
        - vehicleId
        - reg
        - driverId
        - driverName
        - status
        - certification
        - crossBorder
        - needsAttention
      properties:
        vehicleId:
          type: string
        reg:
          type: string
        driverId:
          type: ["string", "null"]
        driverName:
          type: string
        status:
          type: string
        certification:
          type: string
        speedKph:
          type: integer
        fuelPct:
          type: integer
        crossBorder:
          type: boolean
        needsAttention:
          type: boolean
        placeLabel:
          type: ["string", "null"]
        odometerKm:
          type: ["integer", "null"]
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
        lastPingAt:
          type: ["string", "null"]
    Clock:
      type: object
      required: [usedMins, limitMins, remainingMins, status]
      properties:
        usedMins:
          type: integer
        limitMins:
          type: integer
        remainingMins:
          type: integer
        status:
          type: string
    HosClocks:
      type: object
      required: [status, continuous, daily, weekly]
      properties:
        status:
          type: string
        continuous:
          $ref: "#/components/schemas/Clock"
        daily:
          $ref: "#/components/schemas/Clock"
        weekly:
          $ref: "#/components/schemas/Clock"
    IncidentItem:
      type: object
      required: [id, type, severity, status, riskPoints, occurredAt]
      properties:
        id:
          type: string
        type:
          type: string
        detail:
          type: ["string", "null"]
        severity:
          type: string
        status:
          type: string
        riskPoints:
          type: integer
        occurredAt:
          type: string
    DocumentItem:
      type: object
      required: [id, type, label, state]
      properties:
        id:
          type: string
        type:
          type: string
        label:
          type: string
        expiresOn:
          type: ["string", "null"]
        state:
          type: string
    CourseItem:
      type: object
      required: [id, title, status]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
        score:
          type: ["integer", "null"]
        completedOn:
          type: ["string", "null"]
    CertificationInfo:
      type: object
      required: [status, state]
      properties:
        status:
          type: string
        state:
          type: string
        issuedOn:
          type: ["string", "null"]
        expiresOn:
          type: ["string", "null"]
    Telemetry:
      type: object
      required: [speedKph]
      properties:
        speedKph:
          type: integer
        odometerKm:
          type: ["integer", "null"]
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
        lastPingAt:
          type: ["string", "null"]
    DriverRecord:
      type: object
      required:
        - id
        - name
        - employeeNo
        - prdp
        - safetyScore
        - onTimePct
        - status
        - telemetry
        - certification
        - hours
        - incidents
        - documents
        - courses
      properties:
        id:
          type: string
        name:
          type: string
        employeeNo:
          type: string
        phone:
          type: ["string", "null"]
        homeDepot:
          type: ["string", "null"]
        emergencyContact:
          type: ["string", "null"]
        licenceNo:
          type: ["string", "null"]
        licenceClass:
          type: ["string", "null"]
        prdp:
          type: boolean
        safetyScore:
          type: integer
        onTimePct:
          type: integer
        currentVehicleReg:
          type: ["string", "null"]
        placeLabel:
          type: ["string", "null"]
        fuelPct:
          type: ["integer", "null"]
        status:
          type: string
        telemetry:
          $ref: "#/components/schemas/Telemetry"
        certification:
          $ref: "#/components/schemas/CertificationInfo"
        hours:
          $ref: "#/components/schemas/HosClocks"
        incidents:
          type: array
          items:
            $ref: "#/components/schemas/IncidentItem"
        documents:
          type: array
          items:
            $ref: "#/components/schemas/DocumentItem"
        courses:
          type: array
          items:
            $ref: "#/components/schemas/CourseItem"
        trainingProgress:
          $ref: "#/components/schemas/TrainingProgress"
    TrainingProgress:
      type: object
      required: [completed, total, modules]
      properties:
        completed:
          type: integer
        total:
          type: integer
        modules:
          type: array
          items:
            $ref: "#/components/schemas/TrainingProgressItem"
    TrainingProgressItem:
      type: object
      required: [slug, title, category, completed]
      properties:
        slug:
          type: string
        title:
          type: string
        category:
          type: string
        completed:
          type: boolean
        completedAt:
          type: ["string", "null"]
    Alert:
      type: object
      required: [key, kind, severity, driverId, driverName, message, acknowledged]
      properties:
        key:
          type: string
        kind:
          type: string
        severity:
          type: string
        driverId:
          type: string
        driverName:
          type: string
        message:
          type: string
        occurredAt:
          type: ["string", "null"]
        acknowledged:
          type: boolean
    AlertAckInput:
      type: object
      required: [key]
      properties:
        key:
          type: string
          minLength: 1
    RuleProfile:
      type: object
      required:
        - id
        - name
        - contMins
        - dailyMins
        - weeklyMins
        - dailyRestMins
        - breakMins
      properties:
        id:
          type: string
        name:
          type: string
        contMins:
          type: integer
        dailyMins:
          type: integer
        weeklyMins:
          type: integer
        dailyRestMins:
          type: integer
        breakMins:
          type: integer
    RuleProfileUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        contMins:
          type: integer
        dailyMins:
          type: integer
        weeklyMins:
          type: integer
        dailyRestMins:
          type: integer
        breakMins:
          type: integer
    OrgProfile:
      type: object
      required: [id, name, region]
      properties:
        id:
          type: string
        name:
          type: string
        region:
          type: string
    TrainingModuleSection:
      type: object
      required: [heading]
      properties:
        heading:
          type: string
        body:
          type: ["string", "null"]
        steps:
          type: array
          items:
            type: string
        bullets:
          type: array
          items:
            type: string
        tip:
          type: ["string", "null"]
        warning:
          type: ["string", "null"]
    TrainingModuleSummary:
      type: object
      required: [id, slug, title, summary, category, icon, minutes, ordinal, completed]
      properties:
        id:
          type: string
        slug:
          type: string
        title:
          type: string
        summary:
          type: string
        category:
          type: string
        icon:
          type: string
        minutes:
          type: integer
        ordinal:
          type: integer
        completed:
          type: boolean
        completedAt:
          type: ["string", "null"]
    TrainingModuleList:
      type: object
      required: [completed, total, modules]
      properties:
        completed:
          type: integer
        total:
          type: integer
        modules:
          type: array
          items:
            $ref: "#/components/schemas/TrainingModuleSummary"
    TrainingModuleDetail:
      type: object
      required: [id, slug, title, summary, category, icon, minutes, ordinal, sections, completed]
      properties:
        id:
          type: string
        slug:
          type: string
        title:
          type: string
        summary:
          type: string
        category:
          type: string
        icon:
          type: string
        minutes:
          type: integer
        ordinal:
          type: integer
        sections:
          type: array
          items:
            $ref: "#/components/schemas/TrainingModuleSection"
        completed:
          type: boolean
        completedAt:
          type: ["string", "null"]
    TrainingModuleInput:
      type: object
      required: [slug, title, summary, category, icon, minutes, sections]
      properties:
        slug:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        summary:
          type: string
        category:
          type: string
          minLength: 1
        icon:
          type: string
          minLength: 1
        minutes:
          type: integer
        ordinal:
          type: integer
        sections:
          type: array
          items:
            $ref: "#/components/schemas/TrainingModuleSection"
    TrainingReorderInput:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items:
            type: string
    PlatformOverview:
      type: object
      required: [totals, orgs]
      properties:
        totals:
          $ref: "#/components/schemas/PlatformTotals"
        orgs:
          type: array
          items:
            $ref: "#/components/schemas/PlatformOrgStat"
    PlatformTotals:
      type: object
      required: [orgs, users, drivers, vehicles, openAlerts]
      properties:
        orgs:
          type: integer
        users:
          type: integer
        drivers:
          type: integer
        vehicles:
          type: integer
        openAlerts:
          type: integer
    PlatformOrgStat:
      type: object
      required: [id, name, region, active, users, drivers, vehicles, openAlerts]
      properties:
        id:
          type: string
        name:
          type: string
        region:
          type: string
        active:
          type: boolean
        users:
          type: integer
        drivers:
          type: integer
        vehicles:
          type: integer
        openAlerts:
          type: integer
    PlatformOrg:
      type: object
      required: [id, name, region, active, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        region:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
    PlatformOrgInput:
      type: object
      required: [name, region]
      properties:
        name:
          type: string
          minLength: 1
        region:
          type: string
          minLength: 1
    PlatformOrgUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        region:
          type: string
          minLength: 1
        active:
          type: boolean
    PlatformUser:
      type: object
      required: [id, name, email, role, active, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
        active:
          type: boolean
