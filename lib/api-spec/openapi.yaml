openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: fleet
    description: Owner fleet platform
  - name: drivers
    description: Driver records
  - name: alerts
    description: Derived fleet alerts
  - name: setup
    description: Org setup and rule profile
  - name: training
    description: Interactive training for all users
  - name: platform
    description: Superadmin platform console
  - name: telematics
    description: Fleet intelligence, vehicle health and engine diagnostics
  - name: geofences
    description: Geofence definitions and breach events
  - name: behavior
    description: Driver behaviour monitoring and scoring
  - name: maintenance
    description: Maintenance scheduling and work orders
  - name: dispatch
    description: Dispatch board and driver messaging
  - name: analytics
    description: Reporting and analytics
  - name: compliance
    description: ELD hours-of-service compliance
  - name: integrations
    description: API keys, webhooks and device ingest
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out the current session
      responses:
        "204":
          description: Logged out
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /fleet/summary:
    get:
      operationId: getFleetSummary
      tags: [fleet]
      summary: Fleet KPI summary
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetSummary"
  /fleet/vehicles:
    get:
      operationId: getVehicleRows
      tags: [fleet]
      summary: Vehicle list with live status
      responses:
        "200":
          description: Vehicle rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VehicleRow"
  /drivers/{id}:
    get:
      operationId: getDriverRecord
      tags: [drivers]
      summary: Full driver record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Driver record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverRecord"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /alerts:
    get:
      operationId: getAlerts
      tags: [alerts]
      summary: Derived fleet alerts
      responses:
        "200":
          description: Alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"
  /alerts/acknowledge:
    post:
      operationId: acknowledgeAlert
      tags: [alerts]
      summary: Acknowledge an alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertAckInput"
      responses:
        "204":
          description: Acknowledged
  /setup/rule-profile:
    get:
      operationId: getRuleProfile
      tags: [setup]
      summary: Get the org rule profile
      responses:
        "200":
          description: Rule profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleProfile"
    patch:
      operationId: updateRuleProfile
      tags: [setup]
      summary: Update the org rule profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleProfile"
  /setup/org:
    get:
      operationId: getOrgProfile
      tags: [setup]
      summary: Get the org profile
      responses:
        "200":
          description: Org profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgProfile"
  /training/modules:
    get:
      operationId: getTrainingModules
      tags: [training]
      summary: List training modules with the current user's completion state
      responses:
        "200":
          description: Training modules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingModuleList"
  /training/modules/{slug}:
    get:
      operationId: getTrainingModule
      tags: [training]
      summary: Get a single training module by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Training module
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingModuleDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /training/modules/{id}/complete:
    post:
      operationId: completeTrainingModule
      tags: [training]
      summary: Mark a training module complete for the current user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Marked complete
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
    delete:
      operationId: uncompleteTrainingModule
      tags: [training]
      summary: Clear a training module completion for the current user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Completion cleared
  /platform/overview:
    get:
      operationId: getPlatformOverview
      tags: [platform]
      summary: Cross-org platform overview
      responses:
        "200":
          description: Overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformOverview"
  /platform/orgs:
    get:
      operationId: getPlatformOrgs
      tags: [platform]
      summary: List all organizations
      responses:
        "200":
          description: Orgs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlatformOrg"
    post:
      operationId: createPlatformOrg
      tags: [platform]
      summary: Create an organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformOrgInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformOrg"
  /platform/orgs/{id}:
    patch:
      operationId: updatePlatformOrg
      tags: [platform]
      summary: Update an organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformOrgUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformOrg"
    delete:
      operationId: deletePlatformOrg
      tags: [platform]
      summary: Delete an organization and all its data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /platform/orgs/{id}/users:
    get:
      operationId: getPlatformOrgUsers
      tags: [platform]
      summary: List users in an organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlatformUser"
    post:
      operationId: createPlatformOrgUser
      tags: [platform]
      summary: Create a user in an organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformUserInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformUser"
  /platform/users/{id}:
    patch:
      operationId: updatePlatformUser
      tags: [platform]
      summary: Update a user (activate or deactivate)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformUserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformUser"
  /platform/training/modules:
    get:
      operationId: getPlatformTrainingModules
      tags: [platform]
      summary: List all training modules for management
      responses:
        "200":
          description: Modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingModuleDetail"
    post:
      operationId: createPlatformTrainingModule
      tags: [platform]
      summary: Create a training module
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainingModuleInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingModuleDetail"
  /platform/training/modules/{id}:
    patch:
      operationId: updatePlatformTrainingModule
      tags: [platform]
      summary: Update a training module
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainingModuleInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingModuleDetail"
    delete:
      operationId: deletePlatformTrainingModule
      tags: [platform]
      summary: Delete a training module
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /platform/training/reorder:
    post:
      operationId: reorderPlatformTrainingModules
      tags: [platform]
      summary: Reorder training modules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainingReorderInput"
      responses:
        "204":
          description: Reordered
  /platform/enter-org:
    post:
      operationId: enterOrg
      tags: [platform]
      summary: Begin impersonating an organization as owner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnterOrgInput"
      responses:
        "200":
          description: Now impersonating
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "404":
          description: Org not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /platform/exit-org:
    post:
      operationId: exitOrg
      tags: [platform]
      summary: Stop impersonating and return to the platform console
      responses:
        "200":
          description: Impersonation ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
  /contact:
    post:
      operationId: submitContactMessage
      tags: [contact]
      summary: Submit a contact inquiry from the marketing site
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactMessageInput"
      responses:
        "200":
          description: Received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMessageReceipt"
        "400":
          description: Invalid submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /platform/messages:
    get:
      operationId: getPlatformMessages
      tags: [platform]
      summary: List contact inquiries from the marketing site
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactMessage"
  /platform/messages/{id}:
    patch:
      operationId: updatePlatformMessage
      tags: [platform]
      summary: Mark a contact inquiry read or unread
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformMessageUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMessage"
        "404":
          description: Message not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
    delete:
      operationId: deletePlatformMessage
      tags: [platform]
      summary: Delete a contact inquiry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /platform/audit-logs:
    get:
      operationId: getPlatformAuditLogs
      tags: [platform]
      summary: List recent audit-log entries across all organizations
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of entries to return (1 to 200).
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Audit-log entries, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogEntry"
  /telematics/overview:
    get:
      operationId: getTelematicsOverview
      tags: [telematics]
      summary: Unified fleet intelligence overview
      responses:
        "200":
          description: Fleet intelligence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetIntelligence"
  /telematics/health:
    get:
      operationId: getVehicleHealthRows
      tags: [telematics]
      summary: Engine health and diagnostics for every active vehicle
      responses:
        "200":
          description: Vehicle health rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VehicleHealthRow"
  /telematics/health/{vehicleId}:
    get:
      operationId: getVehicleHealthDetail
      tags: [telematics]
      summary: Full engine diagnostics for one vehicle
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Vehicle health detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleHealthDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /geofences:
    get:
      operationId: getGeofences
      tags: [geofences]
      summary: List geofences
      responses:
        "200":
          description: Geofences
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Geofence"
    post:
      operationId: createGeofence
      tags: [geofences]
      summary: Create a geofence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeofenceInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Geofence"
  /geofences/{id}:
    patch:
      operationId: updateGeofence
      tags: [geofences]
      summary: Update a geofence
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeofenceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Geofence"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
    delete:
      operationId: deleteGeofence
      tags: [geofences]
      summary: Delete a geofence
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /geofences/events:
    get:
      operationId: getGeofenceEvents
      tags: [geofences]
      summary: Recent geofence crossings
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeofenceEventItem"
  /behavior:
    get:
      operationId: getBehaviorOverview
      tags: [behavior]
      summary: Driver behaviour leaderboard and recent events
      responses:
        "200":
          description: Behaviour overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BehaviorOverview"
  /maintenance:
    get:
      operationId: getMaintenanceBoard
      tags: [maintenance]
      summary: Maintenance due list and work orders
      responses:
        "200":
          description: Maintenance board
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceBoard"
  /maintenance/work-orders:
    post:
      operationId: createWorkOrder
      tags: [maintenance]
      summary: Create a work order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrderInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderItem"
  /maintenance/work-orders/{id}:
    patch:
      operationId: updateWorkOrder
      tags: [maintenance]
      summary: Update a work order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /dispatch/jobs:
    get:
      operationId: getDispatchJobs
      tags: [dispatch]
      summary: List dispatch jobs
      responses:
        "200":
          description: Jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DispatchJobItem"
    post:
      operationId: createDispatchJob
      tags: [dispatch]
      summary: Create a dispatch job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DispatchJobInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DispatchJobItem"
  /dispatch/jobs/{id}:
    patch:
      operationId: updateDispatchJob
      tags: [dispatch]
      summary: Update a dispatch job (assign, progress status)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DispatchJobUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DispatchJobItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /dispatch/jobs/{id}/messages:
    get:
      operationId: getDispatchMessages
      tags: [dispatch]
      summary: List messages for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DispatchMessageItem"
    post:
      operationId: sendDispatchMessage
      tags: [dispatch]
      summary: Send a message to the driver on a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DispatchMessageInput"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DispatchMessageItem"
  /analytics/report:
    get:
      operationId: getAnalyticsReport
      tags: [analytics]
      summary: Fleet reporting and analytics
      responses:
        "200":
          description: Analytics report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsReport"
  /compliance/hos:
    get:
      operationId: getComplianceHos
      tags: [compliance]
      summary: Per-driver hours-of-service compliance (ELD)
      responses:
        "200":
          description: HOS rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DriverHosRow"
  /setup/alert-rules:
    get:
      operationId: getAlertRules
      tags: [setup]
      summary: List customizable alert rules
      responses:
        "200":
          description: Alert rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlertRule"
  /setup/alert-rules/{kind}:
    patch:
      operationId: updateAlertRule
      tags: [setup]
      summary: Update (upsert) one alert rule by kind
      parameters:
        - name: kind
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertRuleUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertRule"
  /integrations/api-keys:
    get:
      operationId: getApiKeys
      tags: [integrations]
      summary: List API keys
      responses:
        "200":
          description: API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKeyItem"
    post:
      operationId: createApiKey
      tags: [integrations]
      summary: Create an API key (plaintext returned once)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreated"
  /integrations/api-keys/{id}:
    delete:
      operationId: revokeApiKey
      tags: [integrations]
      summary: Revoke an API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Revoked
  /integrations/webhooks:
    get:
      operationId: getWebhooks
      tags: [integrations]
      summary: List webhooks
      responses:
        "200":
          description: Webhooks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebhookItem"
    post:
      operationId: createWebhook
      tags: [integrations]
      summary: Create a webhook subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookItem"
  /integrations/webhooks/{id}:
    delete:
      operationId: deleteWebhook
      tags: [integrations]
      summary: Delete a webhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /ingest/telemetry:
    post:
      operationId: ingestTelemetry
      tags: [integrations]
      summary: Ingest a device telemetry batch (authenticated by API key)
      description: >
        External device gateways POST batches of telemetry here using an API key
        in the `x-api-key` header. The org is resolved from the key, not a session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelemetryIngest"
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestReceipt"
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
