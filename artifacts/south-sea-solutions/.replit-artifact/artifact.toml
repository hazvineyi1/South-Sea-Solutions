kind = "web"
previewPath = "/"
title = "South Sea Solutions"
version = "1.0.0"
id = "artifacts/south-sea-solutions"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20013

[services.development]
run = "pnpm --filter @workspace/south-sea-solutions run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/south-sea-solutions", "run", "build" ]
publicDir = "artifacts/south-sea-solutions/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20013"
BASE_PATH = "/"
